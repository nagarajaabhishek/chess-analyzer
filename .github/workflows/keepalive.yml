name: Keep Render awake (daytime only)

# Render's free tier spins the service down after ~15 min without traffic;
# a cold start takes 30-50s, which exceeds Twilio's ~15s webhook timeout and
# kills incoming hotline calls. Pinging every 5 min keeps the service warm
# (GitHub cron can lag several minutes, so 5 min leaves margin under 15).
#
# Only pings during daytime, 08:00-22:00 America/Chicago. GitHub cron is
# UTC-only and DST-unaware, so the schedule covers the UTC hours spanning
# both CDT (13-03 UTC) and CST (14-04 UTC); the guard step then enforces
# the exact local window.
on:
  schedule:
    - cron: "*/5 0-4,13-23 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Skip outside 08:00-22:00 Chicago time
        run: |
          hour=$(TZ=America/Chicago date +%-H)
          echo "Chicago hour: $hour"
          if [ "$hour" -lt 8 ] || [ "$hour" -ge 22 ]; then
            echo "Outside daytime window — skipping ping."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi
      - name: Ping /api/check
        if: env.SKIP != 'true'
        run: |
          curl -sS -m 90 --retry 3 --retry-delay 10 -o /dev/null \
            -w "HTTP %{http_code} in %{time_total}s\n" \
            https://chessnow.onrender.com/api/check
