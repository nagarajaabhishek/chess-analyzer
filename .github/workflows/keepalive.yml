name: Keep Render awake

# Render's free tier spins the service down after ~15 min without traffic;
# a cold start takes 30-50s, which exceeds Twilio's ~15s webhook timeout and
# kills incoming hotline calls. Pinging every 5 min keeps the service warm
# (GitHub cron can lag several minutes, so 5 min leaves margin under 15).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/check
        run: |
          curl -sS -m 90 --retry 3 --retry-delay 10 -o /dev/null \
            -w "HTTP %{http_code} in %{time_total}s\n" \
            https://chessnow.onrender.com/api/check
